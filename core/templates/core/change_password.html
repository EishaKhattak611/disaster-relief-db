{% extends 'core/base.html' %}
{% block title %}Change Password{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1>Change Password</h1>
        <p class="page-subtitle">Update your account password</p>
    </div>
    <a href="{% url 'coordinator_dashboard' %}" class="btn btn-secondary">← Back</a>
</div>

<div class="panel" style="max-width: 500px;">
    <div class="panel-header"><h2>New Password</h2></div>
    <div class="panel-body" style="padding: 1.25rem;">
        <form method="post" action="{% url 'change_password' %}">
            {% csrf_token %}

            <div class="form-group">
                <label for="old_password">Current Password</label>
                <input type="password" id="old_password" name="old_password" required>
            </div>

            <div class="form-group">
                <label for="new_password">New Password</label>
                <input type="password" id="new_password" name="new_password" required minlength="8">
                <p class="form-help">Minimum 8 characters.</p>
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm New Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required minlength="8">
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Update Password</button>
                <a href="{% url 'coordinator_dashboard' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
